name: Release MacPilot

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Binary (Universal)
        run: |
          make build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MacPilot
            config/settings.toml
            config/Brewfile
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
